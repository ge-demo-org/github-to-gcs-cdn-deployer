name: Deploy Static Website to GCS and Cloud CDN

on:
  push:
    branches:
      - main
    paths:
      - 'public-gemini-docs-gomdols-cloud/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required permission for WIF authentication

jobs:
  deploy:
    name: Upload to GCS and Invalidate Cloud CDN Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1098336234556/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@gemini-enterprise-propagation.iam.gserviceaccount.com'

      - name: Upload static files to GCS bucket
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: 'public-gemini-docs-gomdols-cloud'
          destination: 'gemini-enterprise-propagation-static-web-cdn'
          parent: false

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache website-url-map \
            --path="/*" \
            --async
